<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Bookings</h1>

        <nav>
            <a href="index.html">Dashboard</a>
            <a href="bookings.html">Bookings</a>
            <a href="rooms.html">Rooms</a>
        </nav>
    </header>

    <section class="page-title">
  <h2>Booking Management</h2>
  <p>Add, edit, search, and delete bookings</p>
</section>

    <main>
        <form id="bookingForm">
            <input type="text" id="guestName" placeholder="Guest Name" required>

            <input type="number" id="roomNumber" placeholder="Room Number" required>

            <input type="date" id="checkIn" required>

            <input type="date" id="checkOut" required>

            <button type="submit">Add Booking</button>
        </form>

        <input type="text" id="searchBooking" placeholder="Search by guest name...">

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Guest Name</th>
                    <th>Room Number</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="bookingTableBody"></tbody>
        </table>
    </main>

    <script src="script.js"></script>

<footer>
  <p><strong>Luxury Resort Management System</strong></p>
  <p>Experience comfort, elegance, and unforgettable stays.</p>
</footer>
</body>

</html>
