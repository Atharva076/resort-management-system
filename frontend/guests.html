<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guests</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Guests</h1>

    <nav>
      <a href="index.html">Dashboard</a>
      <a href="bookings.html">Bookings</a>
      <a href="rooms.html">Rooms</a>
      <a href="guests.html">Guests</a>
      <a href="payments.html">Payments</a>
      <a href="staff.html">Staff</a>
      <a href="reviews.html">Reviews</a>
    </nav>
  </header>

  <section class="page-title">
    <h2>Guest Management</h2>
    <p>Add and manage resort guests</p>
  </section>

  <form id="guestForm">
    <input type="text" id="guestName" placeholder="Full Name" required>
    <input type="number" id="guestAge" placeholder="Age" required>
    <input type="text" id="guestId" placeholder="Guest ID" required>
    <input type="text" id="guestAddress" placeholder="Address" required>
    <input type="email" id="guestEmail" placeholder="Email" required>

    <button type="submit">Add Guest</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Age</th>
        <th>Guest ID</th>
        <th>Address</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="guestTableBody"></tbody>
  </table>

  <footer>
    <p><strong>Luxury Resort Management System</strong></p>
    <p>Experience comfort, elegance, and unforgettable stays.</p>
  </footer>

  <script>
  const guestForm = document.getElementById('guestForm');

  guestForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const guestData = {
      full_name: document.getElementById('guestName').value,
      age: document.getElementById('guestAge').value,
      guest_id: document.getElementById('guestId').value,
      address: document.getElementById('guestAddress').value,
      email: document.getElementById('guestEmail').value
    };

    await fetch('http://localhost:5000/guests', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(guestData)
    });

    alert('Guest added successfully');
    guestForm.reset();
  });
</script>

</body>
</html>
